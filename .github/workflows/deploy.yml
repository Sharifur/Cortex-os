name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --workspace=apps/api --workspace=apps/web

      - name: Typecheck API
        run: npm --workspace=apps/api run build --if-present || npx tsc --noEmit
        working-directory: apps/api

      - name: Typecheck Web
        run: npm --workspace=apps/web exec tsc -- --noEmit
        working-directory: apps/web
