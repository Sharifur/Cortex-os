name: Build & Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/sharifur/convex-os

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download GeoLite2-City database
        env:
          MAXMIND_ACCOUNT_ID: ${{ secrets.MAXMIND_ACCOUNT_ID }}
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        run: |
          mkdir -p apps/api/data
          wget -q \
            --user="${MAXMIND_ACCOUNT_ID}" \
            --password="${MAXMIND_LICENSE_KEY}" \
            "https://download.maxmind.com/geoip/databases/GeoLite2-City/download?suffix=tar.gz" \
            -O /tmp/geo.tar.gz
          tar -xzf /tmp/geo.tar.gz --strip-components=1 -C apps/api/data
          rm /tmp/geo.tar.gz
          echo "GeoLite2-City.mmdb size: $(du -sh apps/api/data/GeoLite2-City.mmdb | cut -f1)"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
