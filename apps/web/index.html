<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Cortex OS</title>
    <meta name="description" content="Cortex OS — operator console for AI agents and live chat." />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#1a3aa8" />

    <!-- PWA manifest + theme -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0c1322" />
    <meta name="color-scheme" content="dark" />

    <!-- iOS standalone behavior -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cortex OS" />

    <!-- Tap behavior — prevent zoom on form focus on iOS, keep accessible zoom on the rest -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
